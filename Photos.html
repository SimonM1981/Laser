    <title>Laser Photos - Debug Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --accent: #f472b6;
            --accent-2: #22d3ee;
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-2: #334155;
            --surface-3: #475569;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --text-dim: #64748b;
            --success: #34d399;
            --warning: #fbbf24;
            --danger: #f87171;
            --glass: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; }
        .app-container { max-width: 480px; margin: 0 auto; padding-bottom: 90px; }
        .app-header { padding: 16px 20px; background: linear-gradient(180deg, rgba(15,23,42,0.95), rgba(15,23,42,0.8)); backdrop-filter: blur(20px); border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; z-index: 40; }
        .header-content { display: flex; align-items: center; justify-content: space-between; }
        .logo { display: flex; align-items: center; gap: 10px; }
        .logo-icon { width: 38px; height: 38px; background: linear-gradient(135deg, var(--primary), var(--accent)); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; color: white; }
        .logo-text { font-size: 20px; font-weight: 700; background: linear-gradient(135deg, var(--text), var(--primary-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .debug-badge { padding: 4px 10px; background: var(--danger); border-radius: 6px; font-size: 11px; font-weight: 700; }

        .tab-content { display: none; animation: tabEnter 0.4s cubic-bezier(0.16, 1, 0.3, 1); padding: 0 16px; }
        .tab-content.active { display: block; }
        @keyframes tabEnter { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Debug Console */
        .debug-console { background: #000; border: 1px solid var(--surface-2); border-radius: 12px; padding: 12px; margin: 16px 0; font-family: monospace; font-size: 12px; max-height: 200px; overflow-y: auto; }
        .debug-console .log-info { color: var(--accent-2); }
        .debug-console .log-error { color: var(--danger); }
        .debug-console .log-success { color: var(--success); }
        .debug-console .log-warn { color: var(--warning); }

        /* Camera */
        .camera-container { position: relative; background: #000; border-radius: 24px; overflow: hidden; margin: 16px 0; aspect-ratio: 3/4; }
        #camera-preview { width: 100%; height: 100%; object-fit: cover; }
        .camera-overlay { position: absolute; inset: 0; pointer-events: none; }
        .camera-top-bar { position: absolute; top: 0; left: 0; right: 0; padding: 16px; display: flex; justify-content: space-between; pointer-events: auto; }
        .camera-btn { width: 44px; height: 44px; border-radius: 50%; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; color: white; font-size: 18px; cursor: pointer; }
        .camera-bottom-bar { position: absolute; bottom: 0; left: 0; right: 0; padding: 24px 32px 32px; display: flex; justify-content: center; align-items: center; gap: 40px; background: linear-gradient(to top, rgba(0,0,0,0.7), transparent); pointer-events: auto; }
        .shutter-ring { width: 80px; height: 80px; border-radius: 50%; border: 4px solid rgba(255,255,255,0.8); padding: 4px; cursor: pointer; }
        .shutter-btn { width: 100%; height: 100%; border-radius: 50%; background: white; }
        .gallery-btn { width: 48px; height: 48px; border-radius: 14px; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; cursor: pointer; }

        /* Preview */
        .preview-section { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 24px; padding: 20px; margin-bottom: 16px; }
        .preview-comparison { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
        .preview-box { position: relative; border-radius: 16px; overflow: hidden; border: 2px solid var(--surface-2); }
        .preview-box img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
        .preview-badge { position: absolute; bottom: 8px; right: 8px; padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 700; }
        .preview-badge.original { background: rgba(248,113,113,0.8); color: white; }
        .preview-badge.compressed { background: rgba(52,211,153,0.8); color: white; }
        .preview-label { position: absolute; top: 8px; left: 8px; padding: 3px 8px; border-radius: 6px; font-size: 10px; font-weight: 600; text-transform: uppercase; background: rgba(0,0,0,0.5); color: white; }

        /* Form */
        .form-section { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 24px; padding: 20px; margin-bottom: 16px; }
        .form-group { margin-bottom: 16px; position: relative; }
        .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-input { width: 100%; padding: 14px 16px; background: var(--surface); border: 2px solid var(--surface-2); border-radius: 14px; color: var(--text); font-size: 16px; font-weight: 500; transition: all 0.3s; outline: none; }
        .form-input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(99,102,241,0.15); background: var(--surface-2); }
        .form-input::placeholder { color: var(--text-dim); }

        .upload-btn { width: 100%; padding: 18px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border: none; border-radius: 18px; color: white; font-size: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .upload-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .cancel-btn { width: 100%; padding: 16px; background: var(--surface); border: 2px solid var(--surface-2); border-radius: 18px; color: var(--text-muted); font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 12px; }

        /* Progress */
        .progress-container { margin: 16px 0; }
        .progress-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
        .progress-track { height: 8px; background: var(--surface); border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); border-radius: 4px; transition: width 0.4s; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 50; background: rgba(15,23,42,0.85); backdrop-filter: blur(20px); border-top: 1px solid var(--glass-border); padding: 8px 0; }
        .nav-container { max-width: 480px; margin: 0 auto; display: flex; justify-content: space-around; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px 24px; border: none; background: none; color: var(--text-dim); cursor: pointer; }
        .nav-item i { font-size: 22px; }
        .nav-item span { font-size: 11px; font-weight: 600; }
        .nav-item.active { color: var(--primary-light); }
        .nav-item.active::before { content: ''; position: absolute; top: 0; width: 24px; height: 3px; border-radius: 2px; background: linear-gradient(90deg, var(--primary), var(--accent)); }

        .hidden { display: none !important; }
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(100px); padding: 14px 24px; border-radius: 16px; background: var(--surface); border: 1px solid var(--surface-2); color: var(--text); font-size: 14px; font-weight: 600; z-index: 2000; opacity: 0; transition: all 0.4s; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    </style>

<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-content">
                <div class="logo">
                    <div class="logo-icon"><i class="fas fa-camera-retro"></i></div>
                    <div class="logo-text">Laser Photos</div>
                </div>
                <div class="debug-badge">DEBUG</div>
            </div>
        </header>

        <!-- DEBUG CONSOLE -->
        <div style="padding: 0 16px;">
            <div class="debug-console" id="debug-console">
                <div class="log-info">Debug console initialized...</div>
            </div>
            <button onclick="clearDebug()" style="background: var(--surface); border: 1px solid var(--surface-2); color: var(--text-muted); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 12px; margin-bottom: 8px;">
                <i class="fas fa-trash"></i> Clear Logs
            </button>
        </div>

        <!-- HOME TAB -->
        <div id="tab-home" class="tab-content active">
            <div style="padding: 16px;">
                <h2 style="font-size: 24px; font-weight: 800; margin-bottom: 16px;">Capture & Archive</h2>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px;">
                    <div style="background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px;">
                        <div style="font-size: 32px; font-weight: 800; color: var(--primary-light);" id="stat-today">0</div>
                        <div style="font-size: 12px; color: var(--text-muted);">Photos Today</div>
                    </div>
                    <div style="background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px;">
                        <div style="font-size: 32px; font-weight: 800; color: var(--accent);" id="stat-total">0</div>
                        <div style="font-size: 12px; color: var(--text-muted);">Total Photos</div>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px;">
                    <div onclick="switchTab('capture')" style="background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; padding: 24px; text-align: center; cursor: pointer;">
                        <div style="width: 56px; height: 56px; border-radius: 16px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; color: white; font-size: 24px;">
                            <i class="fas fa-camera"></i>
                        </div>
                        <div style="font-size: 14px; font-weight: 600;">Take Photo</div>
                    </div>
                    <div onclick="switchTab('history')" style="background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; padding: 24px; text-align: center; cursor: pointer;">
                        <div style="width: 56px; height: 56px; border-radius: 16px; background: linear-gradient(135deg, var(--accent), #db2777); display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; color: white; font-size: 24px;">
                            <i class="fas fa-images"></i>
                        </div>
                        <div style="font-size: 14px; font-weight: 600;">View History</div>
                    </div>
                </div>

                <button onclick="testBackend()" style="width: 100%; padding: 14px; background: var(--surface); border: 2px solid var(--surface-2); border-radius: 14px; color: var(--text); font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 12px;">
                    <i class="fas fa-vial"></i> Test Backend Connection
                </button>
                <div id="test-result" style="font-size: 13px; color: var(--text-muted); text-align: center; margin-bottom: 16px;"></div>
            </div>
        </div>

        <!-- CAPTURE TAB -->
        <div id="tab-capture" class="tab-content">
            <div style="padding-top: 16px;">
                <div id="camera-view">
                    <div class="camera-container">
                        <video id="camera-preview" autoplay playsinline style="width: 100%; height: 100%; object-fit: cover;"></video>
                        <canvas id="capture-canvas" class="hidden"></canvas>
                        <div class="camera-overlay">
                            <div class="camera-top-bar">
                                <button class="camera-btn" onclick="toggleCamera()">
                                    <i class="fas fa-sync-alt"></i>
                                </button>
                                <button class="camera-btn" onclick="pickFromGallery()">
                                    <i class="fas fa-images"></i>
                                </button>
                            </div>
                            <div class="camera-bottom-bar">
                                <div class="gallery-btn" onclick="pickFromGallery()">
                                    <i class="fas fa-image"></i>
                                </div>
                                <div class="shutter-ring" onclick="capturePhoto()">
                                    <div class="shutter-btn"></div>
                                </div>
                                <div style="width: 48px;"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <input type="file" id="gallery-input" accept="image/*" capture="environment" class="hidden" onchange="handleGallerySelect(event)">

                <div id="photo-form" class="hidden">
                    <div class="preview-section">
                        <h3 style="font-size: 15px; font-weight: 700; margin-bottom: 16px;"><i class="fas fa-compress-arrows-alt" style="color: var(--primary-light); margin-right: 8px;"></i>Compression Preview</h3>
                        <div class="preview-comparison">
                            <div class="preview-box">
                                <img id="preview-original" src="" alt="Original">
                                <span class="preview-label">Original</span>
                                <span class="preview-badge original" id="size-original">0 KB</span>
                            </div>
                            <div class="preview-box">
                                <img id="preview-compressed" src="" alt="Compressed">
                                <span class="preview-label">Compressed</span>
                                <span class="preview-badge compressed" id="size-compressed">0 KB</span>
                            </div>
                        </div>
                        <div style="display: flex; align-items: center; justify-content: center; gap: 12px; padding: 12px; background: var(--surface); border-radius: 12px;">
                            <span style="font-size: 13px; color: var(--danger); font-weight: 600;" id="compress-from">0 MB</span>
                            <i class="fas fa-arrow-right" style="color: var(--success);"></i>
                            <span style="font-size: 13px; color: var(--success); font-weight: 600;" id="compress-to">0 KB</span>
                            <span style="font-size: 13px; color: var(--accent-2); font-weight: 700;" id="compress-savings">-95%</span>
                        </div>
                    </div>

                    <div class="form-section">
                        <div class="form-group">
                            <label class="form-label">Brand <span style="color: var(--danger);">*</span></label>
                            <input type="text" id="input-brand" class="form-input" placeholder="e.g. Trumpf, Amada..." autocomplete="off">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Part Number <span style="color: var(--danger);">*</span></label>
                            <input type="text" id="input-part" class="form-input" placeholder="e.g. LX2000, P-4521..." autocomplete="off">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Customer Number <span style="color: var(--danger);">*</span></label>
                            <input type="text" id="input-customer" class="form-input" placeholder="e.g. CUST-7823..." autocomplete="off">
                        </div>
                        <div style="background: linear-gradient(135deg, rgba(99,102,241,0.1), rgba(244,114,182,0.1)); border: 1px solid rgba(99,102,241,0.2); border-radius: 14px; padding: 14px 16px;">
                            <div style="font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;">Generated Filename</div>
                            <div style="font-family: monospace; font-size: 13px; color: var(--primary-light); word-break: break-all;" id="filename-preview">---</div>
                        </div>
                    </div>

                    <div id="upload-progress" class="hidden">
                        <div class="progress-container">
                            <div class="progress-header">
                                <span style="color: var(--text-muted); font-weight: 500;">Uploading to Drive...</span>
                                <span style="color: var(--primary-light); font-weight: 700;" id="progress-text">0%</span>
                            </div>
                            <div class="progress-track">
                                <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
                            </div>
                        </div>
                    </div>

                    <button id="btn-upload" class="upload-btn" onclick="uploadPhoto()">
                        <i class="fas fa-cloud-upload-alt"></i> Upload Photo
                    </button>
                    <button class="cancel-btn" onclick="resetCapture()">
                        <i class="fas fa-redo" style="margin-right: 8px;"></i>Retake Photo
                    </button>
                </div>
            </div>
        </div>

        <!-- HISTORY TAB -->
        <div id="tab-history" class="tab-content">
            <div style="padding: 16px;">
                <p style="color: var(--text-muted); text-align: center; padding: 40px 0;">History view coming soon...</p>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-container">
            <button class="nav-item active" data-tab="home" onclick="switchTab('home')">
                <i class="fas fa-home"></i><span>Home</span>
            </button>
            <button class="nav-item" data-tab="capture" onclick="switchTab('capture')">
                <i class="fas fa-camera"></i><span>Capture</span>
            </button>
            <button class="nav-item" data-tab="history" onclick="switchTab('history')">
                <i class="fas fa-images"></i><span>History</span>
            </button>
        </div>
    </nav>

    <div id="toast" class="toast"></div>

    <script>

        const GAS_URL = 'https://script.google.com/macros/s/AKfycbyiKCGytJOfhyAd7nLvaJVH_g_-JNtr4SnpODHvr-GASYunjcDn-KPom2Rfl0kAtCJVsw/exec';
        let currentStream = null;
        let capturedImage = null;
        let compressedBlob = null;

        // ===== DEBUG LOGGER =====
        function log(msg, type = 'info') {
            const console = document.getElementById('debug-console');
            const div = document.createElement('div');
            div.className = 'log-' + type;
            const time = new Date().toLocaleTimeString();
            div.textContent = '[' + time + '] ' + msg;
            console.appendChild(div);
            console.scrollTop = console.scrollHeight;
            // Also log to browser console
            if (type === 'error') console.error(msg);
            else if (type === 'warn') console.warn(msg);
            else console.log(msg);
        }

        function clearDebug() {
            document.getElementById('debug-console').innerHTML = '<div class="log-info">Debug console cleared...</div>';
        }

        // ===== TAB NAVIGATION =====
        function switchTab(tab) {
            log('Switching to tab: ' + tab);
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.querySelector('[data-tab="' + tab + '"]').classList.add('active');
            if (tab === 'capture') initCamera();
        }

        // ===== CAMERA =====
        async function initCamera() {
            log('Initializing camera...', 'info');
            try {
                const constraints = {
                    video: { 
                        facingMode: 'environment',
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    }
                };
                log('Requesting camera with constraints: ' + JSON.stringify(constraints));
                currentStream = await navigator.mediaDevices.getUserMedia(constraints);
                const video = document.getElementById('camera-preview');
                video.srcObject = currentStream;
                log('Camera stream acquired successfully!', 'success');
            } catch (err) {
                log('Camera ERROR: ' + err.name + ' - ' + err.message, 'error');
                showToast('Camera access denied. Use gallery instead.', 'error');
            }
        }

        function toggleCamera() {
            log('Toggling camera...');
            if (currentStream) {
                currentStream.getTracks().forEach(t => t.stop());
                const currentFacing = currentStream.getVideoTracks()[0]?.getSettings().facingMode;
                log('Current facing mode: ' + currentFacing);
                navigator.mediaDevices.getUserMedia({
                    video: { facingMode: currentFacing === 'environment' ? 'user' : 'environment' }
                }).then(stream => {
                    currentStream = stream;
                    document.getElementById('camera-preview').srcObject = stream;
                    log('Camera toggled successfully', 'success');
                }).catch(err => {
                    log('Toggle ERROR: ' + err.message, 'error');
                });
            }
        }

        function pickFromGallery() {
            log('Opening gallery picker...');
            document.getElementById('gallery-input').click();
        }

        function handleGallerySelect(e) {
            log('Gallery file selected');
            const file = e.target.files[0];
            if (!file) {
                log('No file selected', 'warn');
                return;
            }
            log('File: ' + file.name + ' (' + formatBytes(file.size) + ')');
            const reader = new FileReader();
            reader.onload = (event) => {
                log('File read successfully', 'success');
                processImage(event.target.result);
            };
            reader.onerror = (err) => {
                log('File read ERROR: ' + err, 'error');
            };
            reader.readAsDataURL(file);
        }

        function capturePhoto() {
            log('Capture button pressed!');
            const video = document.getElementById('camera-preview');
            const canvas = document.getElementById('capture-canvas');

            log('Video dimensions: ' + video.videoWidth + 'x' + video.videoHeight);

            if (!video.videoWidth || !video.videoHeight) {
                log('Video not ready yet! Width/Height is 0', 'error');
                showToast('Camera not ready. Wait a moment and try again.', 'error');
                return;
            }

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
            log('Photo captured! Data URL length: ' + dataUrl.length + ' chars', 'success');
            processImage(dataUrl);
        }

        // ===== IMAGE COMPRESSION =====
        function processImage(dataUrl) {
            log('Processing image...');
            capturedImage = dataUrl;
            document.getElementById('preview-original').src = dataUrl;

            const originalBytes = Math.round((dataUrl.length * 3) / 4);
            log('Original size: ' + formatBytes(originalBytes));
            document.getElementById('size-original').textContent = formatBytes(originalBytes);
            document.getElementById('compress-from').textContent = formatBytes(originalBytes);

            const img = new Image();
            img.onload = () => {
                log('Image loaded: ' + img.width + 'x' + img.height);
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');

                const maxDim = 1200;
                let w = img.width, h = img.height;
                if (w > h && w > maxDim) { h = (h * maxDim) / w; w = maxDim; }
                else if (h > maxDim) { w = (w * maxDim) / h; h = maxDim; }

                log('Resizing to: ' + w + 'x' + h);
                canvas.width = w;
                canvas.height = h;
                ctx.drawImage(img, 0, 0, w, h);

                canvas.toBlob((blob) => {
                    compressedBlob = blob;
                    const compressedUrl = URL.createObjectURL(blob);
                    document.getElementById('preview-compressed').src = compressedUrl;
                    document.getElementById('size-compressed').textContent = formatBytes(blob.size);
                    document.getElementById('compress-to').textContent = formatBytes(blob.size);

                    const savings = Math.round((1 - blob.size / originalBytes) * 100);
                    document.getElementById('compress-savings').textContent = savings > 0 ? '-' + savings + '%' : '0%';

                    log('Compressed to: ' + formatBytes(blob.size) + ' (saved ' + savings + '%)', 'success');

                    document.getElementById('camera-view').classList.add('hidden');
                    document.getElementById('photo-form').classList.remove('hidden');
                    updateFilenamePreview();
                }, 'image/jpeg', 0.6);
            };
            img.onerror = (err) => {
                log('Image load ERROR: ' + err, 'error');
            };
            img.src = dataUrl;
        }

        function formatBytes(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
        }

        // ===== FORM =====
        function updateFilenamePreview() {
            const brand = document.getElementById('input-brand').value.trim() || 'Brand';
            const part = document.getElementById('input-part').value.trim() || 'Part';
            const customer = document.getElementById('input-customer').value.trim() || 'Customer';
            const now = new Date();
            const ts = now.getFullYear() + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0') + '_' +
                       String(now.getHours()).padStart(2,'0') + String(now.getMinutes()).padStart(2,'0') + String(now.getSeconds()).padStart(2,'0');
            const filename = brand + '_' + part + '_' + customer + '_' + ts + '.jpg';
            document.getElementById('filename-preview').textContent = filename;
        }

        ['input-brand', 'input-part', 'input-customer'].forEach(id => {
            document.getElementById(id).addEventListener('input', updateFilenamePreview);
        });

        // ===== UPLOAD =====
        async function uploadPhoto() {
            const brand = document.getElementById('input-brand').value.trim();
            const part = document.getElementById('input-part').value.trim();
            const customer = document.getElementById('input-customer').value.trim();

            if (!brand || !part || !customer) {
                log('Validation failed: missing fields', 'error');
                showToast('Please fill in all required fields', 'error');
                return;
            }

            if (!compressedBlob) {
                log('No compressed blob available!', 'error');
                showToast('No photo to upload', 'error');
                return;
            }

            log('Starting upload... Brand=' + brand + ', Part=' + part + ', Customer=' + customer);

            const btn = document.getElementById('btn-upload');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin" style="margin-right:10px"></i> Uploading...';
            document.getElementById('upload-progress').classList.remove('hidden');

            try {
                const reader = new FileReader();
                reader.onloadend = async () => {
                    const base64 = reader.result.split(',')[1];
                    log('Base64 encoded, length: ' + base64.length);

                    const payload = {
                        action: 'upload',
                        brand: brand,
                        partNumber: part,
                        customerNumber: customer,
                        imageData: base64,
                        mimeType: 'image/jpeg',
                        originalSize: capturedImage ? Math.round((capturedImage.length * 3) / 4) : 0,
                        compressedSize: compressedBlob.size
                    };

                    log('Payload prepared, sending POST to: ' + GAS_URL);

                    let progress = 0;
                    const progressInterval = setInterval(() => {
                        progress = Math.min(progress + 8, 85);
                        document.getElementById('progress-fill').style.width = progress + '%';
                        document.getElementById('progress-text').textContent = progress + '%';
                    }, 400);

                    // Try with no headers first (simple request)
                    log('Sending fetch...');
                    const resp = await fetch(GAS_URL, {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    });

                    clearInterval(progressInterval);
                    document.getElementById('progress-fill').style.width = '100%';
                    document.getElementById('progress-text').textContent = '100%';

                    log('Response status: ' + resp.status + ' ' + resp.statusText);

                    const result = await resp.json();
                    log('Response JSON: ' + JSON.stringify(result), result.success ? 'success' : 'error');

                    if (result.success) {
                        showToast('Photo uploaded successfully!', 'success');
                        resetCapture();
                        switchTab('home');
                    } else {
                        showToast('Upload failed: ' + (result.error || 'Unknown error'), 'error');
                    }
                };
                reader.readAsDataURL(compressedBlob);
            } catch (err) {
                log('Upload ERROR: ' + err.message, 'error');
                log('Error stack: ' + err.stack, 'error');
                showToast('Upload error: ' + err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-cloud-upload-alt" style="margin-right:10px"></i> Upload Photo';
                setTimeout(() => {
                    document.getElementById('upload-progress').classList.add('hidden');
                    document.getElementById('progress-fill').style.width = '0%';
                }, 1200);
            }
        }

        function resetCapture() {
            log('Resetting capture...');
            compressedBlob = null;
            capturedImage = null;
            document.getElementById('photo-form').classList.add('hidden');
            document.getElementById('camera-view').classList.remove('hidden');
            document.getElementById('input-brand').value = '';
            document.getElementById('input-part').value = '';
            document.getElementById('input-customer').value = '';
            document.getElementById('upload-progress').classList.add('hidden');
            document.getElementById('progress-fill').style.width = '0%';
            initCamera();
        }

        // ===== BACKEND TEST =====
        async function testBackend() {
            log('Testing backend connection...');
            const resultDiv = document.getElementById('test-result');
            resultDiv.textContent = 'Testing...';

            try {
                const url = GAS_URL + '?action=stats';
                log('GET ' + url);
                const resp = await fetch(url);
                log('Response: ' + resp.status + ' ' + resp.statusText);
                const data = await resp.json();
                log('Data: ' + JSON.stringify(data), 'success');
                resultDiv.innerHTML = '<span style="color: var(--success);"><i class="fas fa-check-circle"></i> Backend OK! Total: ' + (data.total || 0) + ' photos</span>';
            } catch (err) {
                log('Backend test ERROR: ' + err.message, 'error');
                resultDiv.innerHTML = '<span style="color: var(--danger);"><i class="fas fa-times-circle"></i> Failed: ' + err.message + '</span>';
            }
        }

        // ===== UTILITIES =====
        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show';
            setTimeout(() => toast.classList.remove('show'), 3500);
        }

        // ===== INIT =====
        document.addEventListener('DOMContentLoaded', () => {
            log('App initialized');
            log('User Agent: ' + navigator.userAgent.substring(0, 50));
            log('Online: ' + navigator.onLine);

            // Check camera support
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                log('getUserMedia is supported', 'success');
            } else {
                log('getUserMedia NOT supported!', 'error');
            }

            initCamera();
        });
    </script>
</body>
</html>
