<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laser Photos — Parts Registry</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --surface2: #1a1d24;
    --border: #252830;
    --accent: #f97316;
    --accent2: #fbbf24;
    --text: #e8eaf0;
    --muted: #6b7280;
    --success: #22c55e;
    --danger: #ef4444;
    --radius: 12px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(249,115,22,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(249,115,22,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  /* ===== HEADER ===== */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,12,16,0.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .logo-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  nav {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
  }

  .nav-btn {
    padding: 8px 20px;
    border: none;
    border-radius: 7px;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 8px;
  }

  .nav-btn.active {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #000;
  }

  .nav-btn:hover:not(.active) { color: var(--text); background: var(--surface2); }

  /* ===== MAIN ===== */
  main {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  .view { display: none; }
  .view.active { display: block; animation: fadeUp 0.3s ease; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ===== SECTION TITLE ===== */
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 40px;
    letter-spacing: 3px;
    color: var(--text);
    margin-bottom: 8px;
  }
  .section-sub { color: var(--muted); font-size: 14px; margin-bottom: 32px; }

  /* ===== FORM ===== */
  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  .form-group { display: flex; flex-direction: column; gap: 8px; }
  .form-group.full { grid-column: 1 / -1; }

  label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
  }

  input, select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus, select:focus { border-color: var(--accent); }
  select option { background: var(--surface2); }

  /* ===== PHOTO UPLOAD ===== */
  .photo-source-btns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 0;
  }

  .photo-src-btn {
    position: relative;
    background: var(--surface2);
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 28px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .photo-src-btn:hover { border-color: var(--accent); background: rgba(249,115,22,0.06); }
  .photo-src-btn input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }

  .photo-src-icon { font-size: 34px; line-height: 1; }
  .photo-src-title { font-size: 14px; font-weight: 600; color: var(--text); }
  .photo-src-sub   { font-size: 11px; color: var(--muted); }

  .photo-preview-wrap {
    position: relative;
    margin-top: 16px;
    display: none;
    border-radius: 10px;
    overflow: hidden;
    max-height: 240px;
  }

  .photo-preview-wrap img {
    width: 100%; max-height: 240px; object-fit: cover; display: block;
  }

  .photo-remove {
    position: absolute; top: 8px; right: 8px;
    background: rgba(0,0,0,0.7);
    border: 1px solid var(--border);
    color: var(--danger);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
  }

  .photo-meta {
    margin-top: 8px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
    text-align: left;
  }

  /* ===== SUBMIT ===== */
  .btn-primary {
    padding: 14px 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 10px;
    color: #000;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    display: flex; align-items: center; gap: 8px;
  }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .form-actions { margin-top: 28px; display: flex; justify-content: flex-end; }

  /* ===== TOAST ===== */
  #toast {
    position: fixed;
    bottom: 24px; right: 24px;
    z-index: 9999;
    padding: 14px 20px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    display: none;
    align-items: center;
    gap: 10px;
    animation: slideIn 0.3s ease;
    max-width: 360px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  #toast.success { background: rgba(34,197,94,0.15); border: 1px solid var(--success); color: var(--success); display: flex; }
  #toast.error   { background: rgba(239,68,68,0.15);  border: 1px solid var(--danger);  color: var(--danger);  display: flex; }

  @keyframes slideIn {
    from { transform: translateX(100%); opacity: 0; }
    to   { transform: translateX(0);   opacity: 1; }
  }

  /* ===== HISTORY ===== */
  .history-controls {
    display: flex;
    gap: 12px;
    margin-bottom: 28px;
    flex-wrap: wrap;
    align-items: center;
  }

  .search-box {
    flex: 1; min-width: 200px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
  }
  .search-box:focus { border-color: var(--accent); }

  .brand-filter {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    min-width: 160px;
  }
  .brand-filter:focus { border-color: var(--accent); }

  .refresh-btn {
    padding: 10px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    cursor: pointer;
    font-size: 18px;
    transition: all 0.2s;
  }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

  .stats-bar {
    display: flex; gap: 24px; margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 20px;
    display: flex; flex-direction: column; gap: 2px;
  }
  .stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--accent); }
  .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }

  /* ===== PHOTO GRID ===== */
  .photo-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
  }

  .photo-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    position: relative;
  }

  .photo-card:hover {
    transform: translateY(-4px);
    border-color: var(--accent);
    box-shadow: 0 12px 40px rgba(249,115,22,0.12);
  }

  .photo-card-img {
    width: 100%; height: 180px; object-fit: cover; display: block;
    background: var(--surface2);
  }

  .no-photo {
    width: 100%; height: 180px;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 40px;
    color: var(--border);
  }

  .photo-card-body { padding: 14px 16px; }

  .card-brand {
    display: inline-block;
    padding: 2px 10px;
    background: rgba(249,115,22,0.15);
    border: 1px solid rgba(249,115,22,0.3);
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .card-part {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
  }

  .card-meta {
    font-size: 12px;
    color: var(--muted);
    display: flex; flex-direction: column; gap: 2px;
    margin-top: 8px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }

  .card-meta span { display: flex; align-items: center; gap: 6px; }

  /* ===== EMPTY STATE ===== */
  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }
  .empty-icon { font-size: 56px; margin-bottom: 16px; }
  .empty h3 { font-size: 18px; color: var(--text); margin-bottom: 8px; }

  /* ===== LOADING ===== */
  .loading {
    text-align: center; padding: 60px;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== LIGHTBOX ===== */
  #lightbox {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.95);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    backdrop-filter: blur(8px);
  }
  #lightbox.open { display: flex; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .lb-close {
    position: absolute; top: 20px; right: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 20px;
    width: 40px; height: 40px;
    border-radius: 8px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .lb-close:hover { background: var(--surface2); }

  .lb-img-wrap {
    position: relative;
    max-width: 90vw; max-height: 75vh;
    overflow: hidden;
    border-radius: 12px;
    border: 1px solid var(--border);
    cursor: zoom-in;
  }

  #lb-img {
    display: block;
    max-width: 90vw; max-height: 75vh;
    object-fit: contain;
    transform-origin: center;
    transition: transform 0.2s ease;
    user-select: none;
  }

  .lb-zoom-controls {
    display: flex; gap: 8px; margin-top: 16px;
  }

  .lb-zoom-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 18px;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .lb-zoom-btn:hover { border-color: var(--accent); color: var(--accent); }

  .lb-info {
    margin-top: 16px;
    text-align: center;
  }

  .lb-part {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 2px;
    color: var(--accent);
  }

  .lb-meta {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* ===== PROGRESS ===== */
  .progress-wrap { display: none; margin-top: 16px; }
  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 8px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    width: 0%;
    transition: width 0.3s ease;
  }
  .progress-label { font-size: 12px; color: var(--muted); }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 640px) {
    .form-grid { grid-template-columns: 1fr; }
    .form-group.full { grid-column: 1; }
    header { padding: 0 16px; }
    .logo-text { font-size: 20px; }
    .nav-btn { padding: 8px 12px; font-size: 12px; }
    main { padding: 20px 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🔬</div>
    <span class="logo-text">Laser Photos</span>
  </div>
  <nav>
    <button class="nav-btn active" onclick="switchView('entry')" id="nav-entry">
      ✦ Entry
    </button>
    <button class="nav-btn" onclick="switchView('history')" id="nav-history">
      ◈ History
    </button>
  </nav>
</header>

<main>

  <!-- ====== ENTRY VIEW ====== -->
  <div class="view active" id="view-entry">
    <div class="section-title">New Record</div>
    <p class="section-sub">Capture and register a laser part photo to the database.</p>

    <div class="form-card">
      <div class="form-grid">

        <div class="form-group">
          <label>Date</label>
          <input type="date" id="f-date">
        </div>

        <div class="form-group">
          <label>Brand</label>
          <input type="text" id="f-brand" placeholder="e.g. Trumpf, IPG, Coherent…">
        </div>

        <div class="form-group">
          <label>Part Number</label>
          <input type="text" id="f-part" placeholder="e.g. P-00123">
        </div>

        <div class="form-group">
          <label>Customer Number</label>
          <input type="text" id="f-customer" placeholder="e.g. C-88421">
        </div>

        <div class="form-group">
          <label>Record By</label>
          <input type="text" id="f-recorder" placeholder="Your name">
        </div>

        <div class="form-group full">
          <label>Photo</label>
          <div class="photo-source-btns">
            <!-- Camera button -->
            <div class="photo-src-btn" id="btn-camera">
              <input type="file" id="f-photo-camera" accept="image/*" capture="environment" onchange="handlePhotoSelect(event)">
              <div class="photo-src-icon">📷</div>
              <div class="photo-src-title">Take Photo</div>
              <div class="photo-src-sub">Open camera</div>
            </div>
            <!-- Upload button -->
            <div class="photo-src-btn" id="btn-upload">
              <input type="file" id="f-photo-upload" accept="image/*" onchange="handlePhotoSelect(event)">
              <div class="photo-src-icon">🖼️</div>
              <div class="photo-src-title">Upload Photo</div>
              <div class="photo-src-sub">From device gallery</div>
            </div>
          </div>

          <div class="photo-preview-wrap" id="preview-wrap">
            <img id="preview-img" src="" alt="Preview">
            <button class="photo-remove" onclick="clearPhoto()">✕ Remove</button>
          </div>
          <div class="photo-meta" id="photo-meta"></div>

          <div class="progress-wrap" id="progress-wrap">
            <div class="progress-label" id="progress-label">Uploading…</div>
            <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
          </div>
        </div>

      </div>

      <div class="form-actions">
        <button class="btn-primary" onclick="submitRecord()" id="submit-btn">
          <span>⬆</span> Save Record
        </button>
      </div>
    </div>
  </div>

  <!-- ====== HISTORY VIEW ====== -->
  <div class="view" id="view-history">
    <div class="section-title">Photo History</div>
    <p class="section-sub">Browse, filter and zoom all registered parts.</p>

    <div class="stats-bar" id="stats-bar">
      <div class="stat"><div class="stat-val" id="stat-total">—</div><div class="stat-label">Total Records</div></div>
      <div class="stat"><div class="stat-val" id="stat-brands">—</div><div class="stat-label">Brands</div></div>
      <div class="stat"><div class="stat-val" id="stat-today">—</div><div class="stat-label">Today</div></div>
    </div>

    <div class="history-controls">
      <input class="search-box" type="text" id="search-box" placeholder="🔍  Search part, customer…" oninput="filterCards()">
      <select class="brand-filter" id="brand-filter" onchange="filterCards()">
        <option value="">All Brands</option>
      </select>
      <button class="refresh-btn" onclick="loadHistory()" title="Refresh">⟳</button>
    </div>

    <div id="history-content">
      <div class="loading"><div class="spinner"></div><p style="color:var(--muted)">Loading records…</p></div>
    </div>
  </div>

</main>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="lbClickOutside(event)">
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <div class="lb-img-wrap" onclick="lbZoomCycle()">
    <img id="lb-img" src="" alt="">
  </div>
  <div class="lb-zoom-controls">
    <button class="lb-zoom-btn" onclick="lbZoom(-1)">−</button>
    <button class="lb-zoom-btn" onclick="lbZoomReset()">↺</button>
    <button class="lb-zoom-btn" onclick="lbZoom(1)">+</button>
  </div>
  <div class="lb-info">
    <div class="lb-part" id="lb-part"></div>
    <div class="lb-meta" id="lb-meta"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// =====================================================
//  CONFIG — edit these if your IDs change
// =====================================================
const SHEET_ID   = '1B4lHkebj34KKPdka6r894VkjrnvzMSZVGzz7LAi0kdE';
const FOLDER_ID  = '1qAIDxjJTWVWyayGSlOYqDbJZfluaP9eG';
const SHEET_NAME = 'Photos';

// Replace with your deployed Apps Script Web App URL:
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwKkjuehfetQNjHA2w_1fsbcR4kcMAEpUdCe7sG28nUbZrZqAi-WyS2bdojCTQCDPp2YA/exec';

// =====================================================
//  STATE
// =====================================================
let allRecords   = [];
let compressedBlob = null;
let compressedName = '';
let lbScale      = 1;

// =====================================================
//  NAVIGATION
// =====================================================
function switchView(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  document.getElementById('nav-' + v).classList.add('active');
  if (v === 'history') loadHistory();
}

// =====================================================
//  DATE DEFAULT
// =====================================================
window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
});

// =====================================================
//  PHOTO HANDLING
// =====================================================
function handlePhotoSelect(e) {
  const file = e.target.files[0];
  if (file) processPhoto(file);
}

function processPhoto(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      // Compress: max 1200px wide, quality 0.82
      const MAX = 1200;
      let w = img.width, h = img.height;
      if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      canvas.toBlob(blob => {
        compressedBlob = blob;
        const origKB = Math.round(file.size / 1024);
        const newKB  = Math.round(blob.size  / 1024);
        document.getElementById('photo-meta').textContent =
          `Original: ${origKB} KB → Compressed: ${newKB} KB  |  ${w}×${h}px`;

        const url = URL.createObjectURL(blob);
        document.getElementById('preview-img').src = url;
        document.getElementById('preview-wrap').style.display = 'block';
      }, 'image/jpeg', 0.82);
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function clearPhoto() {
  compressedBlob = null;
  document.getElementById('f-photo-camera').value = '';
  document.getElementById('f-photo-upload').value = '';
  document.getElementById('preview-wrap').style.display = 'none';
  document.getElementById('photo-meta').textContent = '';
}

// =====================================================
//  SUBMIT
// =====================================================
async function submitRecord() {
  const date     = document.getElementById('f-date').value.trim();
  const brand    = document.getElementById('f-brand').value.trim();
  const part     = document.getElementById('f-part').value.trim();
  const customer = document.getElementById('f-customer').value.trim();
  const recorder = document.getElementById('f-recorder').value.trim();

  if (!date || !brand || !part || !customer || !recorder) {
    showToast('Please fill in all fields.', 'error'); return;
  }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = '⏳ Saving…';

  const pw = document.getElementById('progress-wrap');
  const pf = document.getElementById('progress-fill');
  const pl = document.getElementById('progress-label');
  pw.style.display = 'block';

  try {
    let photoBase64 = '';
    let photoName   = '';

    if (compressedBlob) {
      pl.textContent = 'Encoding photo…'; pf.style.width = '20%';
      photoBase64 = await blobToBase64(compressedBlob);
      photoName   = `${sanitize(part)}_${sanitize(customer)}.jpg`;
    }

    pl.textContent = 'Sending to Google Sheets…'; pf.style.width = '60%';

    const payload = { date, brand, part, customer, recorder, photoBase64, photoName, folderId: FOLDER_ID };

    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify(payload)
    });

    pf.style.width = '100%'; pl.textContent = 'Done!';

    const json = await res.json();
    if (json.status === 'ok') {
      showToast('✔ Record saved successfully!', 'success');
      resetForm();
    } else {
      throw new Error(json.message || 'Unknown error');
    }
  } catch(err) {
    showToast('Error: ' + err.message, 'error');
  } finally {
    btn.disabled = false; btn.innerHTML = '<span>⬆</span> Save Record';
    setTimeout(() => { pw.style.display = 'none'; pf.style.width = '0%'; }, 1500);
  }
}

function sanitize(s) { return s.replace(/[^a-zA-Z0-9\-_]/g, '_'); }

function blobToBase64(blob) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(blob);
  });
}

function resetForm() {
  document.getElementById('f-brand').value    = '';
  document.getElementById('f-part').value     = '';
  document.getElementById('f-customer').value = '';
  document.getElementById('f-recorder').value = '';
  document.getElementById('f-date').value     = new Date().toISOString().split('T')[0];
  clearPhoto();
}

// =====================================================
//  HISTORY
// =====================================================
async function loadHistory() {
  document.getElementById('history-content').innerHTML =
    '<div class="loading"><div class="spinner"></div><p style="color:var(--muted)">Loading records…</p></div>';

  try {
    const url = `${APPS_SCRIPT_URL}?action=get&sheet=${encodeURIComponent(SHEET_NAME)}`;
    const res  = await fetch(url);
    const json = await res.json();

    if (!json.records) throw new Error('No records field');
    allRecords = json.records;
    buildStats();
    buildBrandFilter();
    renderCards(allRecords);
  } catch(err) {
    document.getElementById('history-content').innerHTML =
      `<div class="empty"><div class="empty-icon">⚠️</div><h3>Could not load records</h3><p>${err.message}</p></div>`;
  }
}

function buildStats() {
  const today = new Date().toISOString().split('T')[0];
  const brands = new Set(allRecords.map(r => r.brand).filter(Boolean));
  const todayCount = allRecords.filter(r => r.date === today).length;
  document.getElementById('stat-total').textContent  = allRecords.length;
  document.getElementById('stat-brands').textContent = brands.size;
  document.getElementById('stat-today').textContent  = todayCount;
}

function buildBrandFilter() {
  const sel    = document.getElementById('brand-filter');
  const brands = [...new Set(allRecords.map(r => r.brand).filter(Boolean))].sort();
  sel.innerHTML = '<option value="">All Brands</option>';
  brands.forEach(b => {
    const o = document.createElement('option');
    o.value = b; o.textContent = b;
    sel.appendChild(o);
  });
}

function filterCards() {
  const q   = document.getElementById('search-box').value.toLowerCase();
  const brand = document.getElementById('brand-filter').value;
  const filtered = allRecords.filter(r => {
    const matchBrand = !brand || r.brand === brand;
    const matchQ = !q ||
      (r.part     && r.part.toLowerCase().includes(q)) ||
      (r.customer && r.customer.toLowerCase().includes(q)) ||
      (r.recorder && r.recorder.toLowerCase().includes(q));
    return matchBrand && matchQ;
  });
  renderCards(filtered);
}

// Convert any Google Drive URL to a working thumbnail URL
function driveThumb(url) {
  if (!url) return '';
  // Extract file ID from various Drive URL formats
  let id = '';
  const m1 = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  const m2 = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  const m3 = url.match(/open\?id=([a-zA-Z0-9_-]+)/);
  if (m1) id = m1[1];
  else if (m2) id = m2[1];
  else if (m3) id = m3[1];
  else return url; // not a Drive URL, return as-is
  // Use thumbnail API — works cross-origin without login for public files
  return `https://drive.google.com/thumbnail?id=${id}&sz=w600`;
}

function renderCards(records) {
  if (!records.length) {
    document.getElementById('history-content').innerHTML =
      `<div class="empty"><div class="empty-icon">📂</div><h3>No records found</h3><p>Try adjusting your search or filters.</p></div>`;
    return;
  }

  const grid = document.createElement('div');
  grid.className = 'photo-grid';

  records.slice().reverse().forEach(r => {
    const card = document.createElement('div');
    card.className = 'photo-card';
    card.onclick = () => openLightbox(r);

    const photoHtml = r.photoUrl
      ? `<img class="photo-card-img" src="${driveThumb(r.photoUrl)}" alt="" loading="lazy" onerror="this.outerHTML='<div class=no-photo>🖼</div>'">`
      : `<div class="no-photo">🖼</div>`;

    card.innerHTML = `
      ${photoHtml}
      <div class="photo-card-body">
        <div class="card-brand">${r.brand || '—'}</div>
        <div class="card-part">${r.part || '—'}</div>
        <div class="card-meta">
          <span>👤 ${r.customer || '—'}</span>
          <span>📅 ${r.date || '—'}</span>
          <span>✍️ ${r.recorder || '—'}</span>
        </div>
      </div>`;
    grid.appendChild(card);
  });

  document.getElementById('history-content').innerHTML = '';
  document.getElementById('history-content').appendChild(grid);
}

// =====================================================
//  LIGHTBOX
// =====================================================
function openLightbox(r) {
  // Use high-res thumbnail for lightbox
  const hiRes = r.photoUrl ? driveThumb(r.photoUrl).replace('sz=w600','sz=w1600') : '';
  document.getElementById('lb-img').src  = hiRes;
  document.getElementById('lb-part').textContent = `${r.part || ''} / ${r.customer || ''}`;
  document.getElementById('lb-meta').textContent =
    `Brand: ${r.brand || '—'}  |  Date: ${r.date || '—'}  |  By: ${r.recorder || '—'}`;
  lbScale = 1;
  document.getElementById('lb-img').style.transform = 'scale(1)';
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

function lbClickOutside(e) {
  if (e.target === document.getElementById('lightbox')) closeLightbox();
}

function lbZoom(dir) {
  lbScale = Math.min(5, Math.max(0.5, lbScale + dir * 0.5));
  document.getElementById('lb-img').style.transform = `scale(${lbScale})`;
}
function lbZoomReset() { lbScale = 1; document.getElementById('lb-img').style.transform = 'scale(1)'; }
function lbZoomCycle() { lbScale = lbScale >= 3 ? 1 : lbScale + 0.75; document.getElementById('lb-img').style.transform = `scale(${lbScale})`; }

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLightbox();
  if (e.key === '+' || e.key === '=') lbZoom(1);
  if (e.key === '-') lbZoom(-1);
});

// =====================================================
//  TOAST
// =====================================================
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = type;
  setTimeout(() => { t.className = ''; }, 3500);
}
</script>
