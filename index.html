<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; background: #f8f9fa; }
    .nav-tabs .nav-link { font-weight: 600; }
    .table th { background-color: #f8f9fa; }
    .excel-row input { font-size: 1rem; height: 42px; }
    .excel-row label { font-size: 0.85rem; margin-bottom: 4px; font-weight: 500; }
    .paste-info { font-size: 0.85rem; color: #555; }
    .header {
      background: linear-gradient(90deg, #0d6efd, #6610f2);
      color: white;
      padding: 18px 20px;
      border-radius: 12px;
      margin-bottom: 25px;
    }
    .app-url { color: white; text-decoration: underline; }
    .app-url:hover { color: #fff; }
  </style>
</head>
<body>
  <div class="container py-4">

    <div class="header d-flex justify-content-between align-items-center">
      <div>
        <h1 class="mb-1">🔥 Laser Data App</h1>
        <p class="mb-0">Live from Google Apps Script</p>
      </div>
      <div>
        <a href="https://script.google.com/macros/s/AKfycbz_hQaLVedOduHp0AyAvqR4aKeX5DQJRkMb8s51TW8128fFsn7rda4tRP72W0ildyic/exec" 
           target="_blank" class="app-url fw-bold">
          🔗 My App URL
        </a>
      </div>
    </div>

    <ul class="nav nav-tabs mb-4">
      <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#entry">Data Entry</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#daily">Daily by Machine</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#summary">Summary Data</button></li>
    </ul>

    <div class="tab-content">

      <div class="tab-pane fade show active" id="entry">
        <div class="card shadow-sm">
          <div class="card-body">
            <h5>📋 New Entry (Excel-style row)</h5>
            <p class="paste-info mb-3">
              💡 Copy rows from Excel → click any field → Ctrl + V
            </p>
            <form id="entryForm">
              <div class="excel-row row g-2 align-items-end">
                <div class="col-md-2"><label>Received Date</label><input type="date" id="receivedDate" class="form-control"></div>
                <div class="col-md-2"><label>Lasered Date</label><input type="date" id="laseredDate" class="form-control" required></div>
                <div class="col"><label>Customer</label><input type="text" id="customer" class="form-control" required></div>
                <div class="col-md-2"><label>Brand</label><input type="text" id="brand" class="form-control"></div>
                <div class="col-md-2"><label>P/I No.</label><input type="text" id="piNo" class="form-control"></div>
                <div class="col"><label>Part No.</label><input type="text" id="partNo" class="form-control" required></div>
                <div class="col-md-2"><label>Lot Received</label><input type="text" id="lotReceived" class="form-control"></div>
                <div class="col-md-2"><label>Qty</label><input type="number" id="qty" class="form-control" required></div>
                <div class="col"><label>Laser Lot No.</label><input type="text" id="laserLotNo" class="form-control"></div>
                <div class="col-md-2"><label>Laser by</label><input type="text" id="laserBy" class="form-control"></div>
                <div class="col-md-2"><label>Machine No.</label><input type="text" id="machineNo" class="form-control" required></div>
              </div>

              <div class="mt-4">
                <button type="submit" class="btn btn-success btn-lg px-5 me-3">Submit Entry</button>
                <button type="button" onclick="clearForm()" class="btn btn-outline-secondary">Clear Form</button>
              </div>
            </form>
          </div>
        </div>
      </div>

      <!-- Daily and Summary tabs (simplified for now) -->
      <div class="tab-pane fade" id="daily">
        <div class="card shadow-sm p-4">
          <p class="text-muted">Daily tab coming soon after basic submit works.</p>
        </div>
      </div>
      <div class="tab-pane fade" id="summary">
        <div class="card shadow-sm p-4">
          <p class="text-muted">Summary tab coming soon after basic submit works.</p>
        </div>
      </div>
    </div>

  </div>

  <script>
    // Simple version to test submit first
    document.getElementById('entryForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const entryData = [
        document.getElementById('receivedDate').value ? new Date(document.getElementById('receivedDate').value) : null,
        document.getElementById('laseredDate').value ? new Date(document.getElementById('laseredDate').value) : null,
        document.getElementById('customer').value.trim(),
        document.getElementById('brand').value.trim(),
        document.getElementById('piNo').value.trim(),
        document.getElementById('partNo').value.trim(),
        document.getElementById('lotReceived').value.trim(),
        parseFloat(document.getElementById('qty').value) || 0,
        document.getElementById('laserLotNo').value.trim(),
        document.getElementById('laserBy').value.trim(),
        document.getElementById('machineNo').value.trim()
      ];

      google.script.run
        .withSuccessHandler(res => {
          alert(res.message);
          document.getElementById('entryForm').reset();
        })
        .withFailureHandler(err => {
          alert("Submit failed: " + err.message);
          console.error(err);
        })
        .addNewEntry(entryData);
    });

    // Test load
    window.onload = function() {
      if (typeof google === 'undefined') {
        alert("Please open using the Google Apps Script URL, not GitHub.");
      }
    };
  </script>
</body>
</html>
